<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极简实时盯盘 + 90天历史</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-4 font-sans antialiased">
    <div class="max-w-5xl mx-auto space-y-6">
        
        <div class="bg-gray-800 rounded-xl p-5 shadow-lg border border-gray-700">
            <h2 class="text-xl font-bold mb-4 flex items-center">
                <svg class="w-5 h-5 mr-2 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                查询90天历史行情
            </h2>
            <div class="flex gap-2 mb-4">
                <input id="history-input" type="text" placeholder="输入代码 (如: sh600519 或 600519)" 
                       class="flex-1 p-3 rounded-lg bg-gray-900 text-white border border-gray-600 focus:outline-none focus:border-blue-500 transition-colors" />
                <button onclick="fetchHistory()" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-lg text-white font-bold transition-colors">
                    查询
                </button>
            </div>
            
            <div id="history-result" class="hidden">
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div class="bg-gray-900 p-4 rounded-lg border border-red-900/50">
                        <div class="text-sm text-gray-400">90天盘中最高</div>
                        <div id="hist-high" class="text-2xl font-bold text-red-500 mt-1">--</div>
                        <div id="hist-high-date" class="text-xs text-gray-500 mt-1">--</div>
                    </div>
                    <div class="bg-gray-900 p-4 rounded-lg border border-green-900/50">
                        <div class="text-sm text-gray-400">90天盘中最低</div>
                        <div id="hist-low" class="text-2xl font-bold text-green-500 mt-1">--</div>
                        <div id="hist-low-date" class="text-xs text-gray-500 mt-1">--</div>
                    </div>
                </div>
                
                <div class="bg-gray-900 rounded-lg overflow-hidden border border-gray-700">
                    <div class="max-h-64 overflow-y-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="text-xs text-gray-400 bg-gray-800 sticky top-0">
                                <tr>
                                    <th class="p-3">日期</th>
                                    <th class="p-3">收盘</th>
                                    <th class="p-3 hidden sm:table-cell">最高</th>
                                    <th class="p-3 hidden sm:table-cell">最低</th>
                                </tr>
                            </thead>
                            <tbody id="hist-table-body" class="divide-y divide-gray-800">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <hr class="border-gray-700">
        <div class="flex justify-between items-end mb-2">
            <h1 class="text-2xl md:text-3xl font-bold">自选股实时行情</h1>
            <span id="update-time" class="text-xs text-gray-400">加载中...</span>
        </div>
        <div id="stock-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            </div>
    </div>

    <script>
        /* =========================================
           功能一：实时行情 (腾讯接口)
           ========================================= */
        const stocks = ['sh000001', 'sh600519', 'sz000001', 'sz002594', 'sh510300'];

        function fetchStocks() {
            const script = document.createElement('script');
            script.src = `https://qt.gtimg.cn/q=${stocks.join(',')}`;
            script.onload = () => {
                const container = document.getElementById('stock-container');
                let htmlContent = '';
                stocks.forEach(code => {
                    const dataStr = window[`v_${code}`];
                    if (dataStr) {
                        const details = dataStr.split('~');
                        if (details.length > 30) {
                            const name = details[1];
                            const price = parseFloat(details[3]).toFixed(2);
                            const changeAmount = parseFloat(details[31]);
                            const changePercent = parseFloat(details[32]);
                            
                            let colorClass = 'text-white';
                            let sign = '';
                            if (changeAmount > 0) { colorClass = 'text-red-500'; sign = '+'; } 
                            else if (changeAmount < 0) { colorClass = 'text-green-500'; }

                            htmlContent += `
                                <div class="bg-gray-800 rounded-xl p-5 shadow-lg flex justify-between items-center transition-transform hover:scale-[1.02] border border-gray-700 hover:border-gray-500">
                                    <div>
                                        <div class="text-lg md:text-xl font-bold">${name}</div>
                                        <div class="text-xs text-gray-400 mt-1 uppercase">${code}</div>
                                    </div>
                                    <div class="text-right ${colorClass}">
                                        <div class="text-2xl md:text-3xl font-bold">${price}</div>
                                        <div class="text-sm font-medium mt-1">${sign}${changeAmount} (${sign}${changePercent}%)</div>
                                    </div>
                                </div>
                            `;
                        }
                    }
                });
                container.innerHTML = htmlContent;
                const now = new Date();
                document.getElementById('update-time').innerText = `最后更新: ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
                document.head.removeChild(script); 
            };
            document.head.appendChild(script);
        }

        fetchStocks();
        setInterval(fetchStocks, 3000);

        /* =========================================
           功能二：90天历史查询 (东方财富接口)
           ========================================= */
        function fetchHistory() {
            const inputVal = document.getElementById('history-input').value.trim().toLowerCase();
            if (!inputVal) return alert("请输入股票代码！");

            // 智能识别代码并转换为东方财富格式 (0.代表深交所，1.代表上交所)
            const codeNum = inputVal.replace(/[^0-9]/g, ''); 
            if (codeNum.length !== 6) return alert("请输入6位有效的股票代码！");
            
            let secid = '';
            if (inputVal.startsWith('sh') || codeNum.startsWith('6')) {
                secid = `1.${codeNum}`; // 沪市
            } else {
                secid = `0.${codeNum}`; // 深市
            }

            const btn = document.querySelector('button');
            btn.innerText = "查询中...";

            // 构造东方财富 JSONP URL (lmt=90 代表90天，fqt=1 代表前复权)
            const cbName = 'jsonp_history_' + Date.now();
            const url = `https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=${secid}&fields1=f1,f2,f3,f4,f5&fields2=f51,f52,f53,f54,f55&klt=101&fqt=1&end=20500101&lmt=90&cb=${cbName}`;

            // 全局回调函数
            window[cbName] = function(data) {
                btn.innerText = "查询";
                if (!data || !data.data || !data.data.klines || data.data.klines.length === 0) {
                    return alert("未查询到数据，请检查代码是否正确（或不支持该品种）。");
                }
                renderHistoryData(data.data);
                delete window[cbName]; // 清理全局变量
            };

            const script = document.createElement('script');
            script.src = url;
            script.onload = () => document.head.removeChild(script); // 清理 DOM
            script.onerror = () => { btn.innerText = "查询"; alert("网络请求失败"); };
            document.head.appendChild(script);
        }

        function renderHistoryData(data) {
            const klines = data.klines; // 格式: "日期,开盘,收盘,最高,最低"
            
            let maxHigh = -1, maxHighDate = '';
            let minLow = 999999, minLowDate = '';
            let tableRows = '';

            // 数据默认是正序（旧到新），我们把它反转，让最新的日期显示在最上面
            klines.reverse().forEach(line => {
                const parts = line.split(',');
                const date = parts[0];
                const open = parseFloat(parts[1]);
                const close = parseFloat(parts[2]);
                const high = parseFloat(parts[3]);
                const low = parseFloat(parts[4]);

                // 找 90 天极值
                if (high > maxHigh) { maxHigh = high; maxHighDate = date; }
                if (low < minLow) { minLow = low; minLowDate = date; }

                // 决定单日红绿颜色
                const color = close >= open ? 'text-red-400' : 'text-green-400';

                tableRows += `
                    <tr class="hover:bg-gray-800 transition-colors">
                        <td class="p-3">${date}</td>
                        <td class="p-3 font-bold ${color}">${close.toFixed(2)}</td>
                        <td class="p-3 hidden sm:table-cell">${high.toFixed(2)}</td>
                        <td class="p-3 hidden sm:table-cell">${low.toFixed(2)}</td>
                    </tr>
                `;
            });

            // 渲染数据到页面
            document.getElementById('hist-high').innerText = maxHigh.toFixed(2);
            document.getElementById('hist-high-date').innerText = maxHighDate;
            document.getElementById('hist-low').innerText = minLow.toFixed(2);
            document.getElementById('hist-low-date').innerText = minLowDate;
            document.getElementById('hist-table-body').innerHTML = tableRows;
            
            // 显示结果面板
            document.getElementById('history-result').classList.remove('hidden');
        }
    </script>
</body>
</html>
