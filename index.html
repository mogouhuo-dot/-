<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极简实时盯盘</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-4 font-sans antialiased">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-end mb-6">
            <h1 class="text-2xl md:text-3xl font-bold">自选股实时行情</h1>
            <span id="update-time" class="text-xs text-gray-400">加载中...</span>
        </div>
        
        <div id="stock-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            </div>
    </div>

    <script>
        // 【在此处配置你的股票池】
        // 支持 A 股 (sh/sz前缀)、ETF 等。
        const stocks = [
            'sh000001', // 上证指数
            'sh600519', // 贵州茅台
            'sz000001', // 平安银行
            'sz002594', // 比亚迪
            'sh510300'  // 沪深300ETF
        ];

        function fetchStocks() {
            // 使用 JSONP 动态创建 script 标签来请求数据，解决跨域问题
            const script = document.createElement('script');
            // 腾讯财经接口支持批量查询，用逗号分隔
            script.src = `https://qt.gtimg.cn/q=${stocks.join(',')}`;
            
            script.onload = () => {
                const container = document.getElementById('stock-container');
                let htmlContent = '';

                stocks.forEach(code => {
                    const dataStr = window[`v_${code}`];
                    if (dataStr) {
                        const details = dataStr.split('~');
                        if (details.length > 30) {
                            // 解析腾讯接口数据
                            const name = details[1];
                            const price = parseFloat(details[3]).toFixed(2);
                            const changeAmount = parseFloat(details[31]);
                            const changePercent = parseFloat(details[32]);

                            // 设定颜色：A股红涨绿跌，平盘为白色
                            let colorClass = 'text-white';
                            let sign = '';
                            if (changeAmount > 0) {
                                colorClass = 'text-red-500';
                                sign = '+';
                            } else if (changeAmount < 0) {
                                colorClass = 'text-green-500';
                            }

                            // 构建卡片 HTML
                            htmlContent += `
                                <div class="bg-gray-800 rounded-xl p-5 shadow-lg flex justify-between items-center transition-transform hover:scale-[1.02]">
                                    <div>
                                        <div class="text-lg md:text-xl font-bold">${name}</div>
                                        <div class="text-xs text-gray-400 mt-1 uppercase">${code}</div>
                                    </div>
                                    <div class="text-right ${colorClass}">
                                        <div class="text-2xl md:text-3xl font-bold">${price}</div>
                                        <div class="text-sm font-medium mt-1">
                                            ${sign}${changeAmount} (${sign}${changePercent}%)
                                        </div>
                                    </div>
                                </div>
                            `;
                        }
                    }
                });

                // 更新 DOM
                container.innerHTML = htmlContent;
                
                // 更新时间显示
                const now = new Date();
                document.getElementById('update-time').innerText = `最后更新: ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
                
                // 清理加载完的 script 标签，防止 DOM 臃肿
                document.head.removeChild(script); 
            };
            
            document.head.appendChild(script);
        }

        // 页面打开时立即加载一次
        fetchStocks();
        
        // 每 3 秒自动刷新一次数据
        setInterval(fetchStocks, 3000);
    </script>
</body>
</html>
