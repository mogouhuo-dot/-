<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro版实时盯盘系统 v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        /* 自定义滚动条样式，让界面更清爽 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4B5563; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #6B7280; }
        .slide-in { animation: slideIn 0.3s forwards cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans antialiased overflow-x-hidden">

    <div id="main-screen" class="max-w-5xl mx-auto p-4 space-y-6 pb-20">
        
        <div class="bg-gray-800 rounded-xl p-5 shadow-lg border border-gray-700">
            <h2 class="text-xl font-bold mb-4 text-blue-400">行情搜索</h2>
            <div class="flex gap-2">
                <input id="search-input" type="text" placeholder="输入代码 (如: 600519)" 
                       class="flex-1 p-3 rounded-lg bg-gray-900 text-white border border-gray-600 focus:outline-none focus:border-blue-500" />
                <button onclick="executeSearch()" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-lg text-white font-bold transition-colors">
                    搜索
                </button>
            </div>
            
            <div id="search-result-area" class="mt-4 hidden">
                <div class="text-xs text-gray-400 mb-2">搜索结果 (点击查看详情)</div>
                <div id="search-result-card"></div>
            </div>
        </div>

        <hr class="border-gray-700">
        <div class="flex justify-between items-end mb-2">
            <h1 class="text-2xl font-bold">我的自选</h1>
            <span class="text-xs text-gray-400">本地存储</span>
        </div>
        <div id="stock-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            </div>
    </div>


    <div id="detail-screen" class="fixed inset-0 bg-gray-900 z-50 hidden slide-in overflow-y-auto">
        <div class="max-w-5xl mx-auto p-4 pb-10">
            
            <div class="flex justify-between items-center mb-6 sticky top-0 bg-gray-900/95 py-2 z-10 backdrop-blur">
                <button onclick="closeDetail()" class="text-gray-300 hover:text-white flex items-center bg-gray-800 px-3 py-1.5 rounded-lg border border-gray-700">
                    <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    返回
                </button>
                <div class="text-center flex-1">
                    <div id="nav-name" class="font-bold text-lg">--</div>
                    <div id="nav-code" class="text-xs text-gray-400 uppercase">--</div>
                </div>
                <button onclick="toggleWatchlist()" id="btn-toggle-watchlist" class="bg-green-600 hover:bg-green-700 text-sm px-3 py-1.5 rounded text-white transition-colors">
                    + 自选
                </button>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 flex flex-col justify-center">
                    <div class="text-sm text-gray-400">最新价</div>
                    <div id="detail-price" class="text-2xl font-bold mt-1">--</div>
                </div>
                <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 flex flex-col justify-center">
                    <div class="text-sm text-gray-400">涨跌</div>
                    <div id="detail-change" class="text-xl font-bold mt-1">--</div>
                </div>
                <div class="bg-gray-800 p-3 rounded-xl border border-gray-700">
                    <div class="text-xs text-gray-400">量比</div>
                    <div id="detail-vol-ratio" class="text-lg font-bold mt-1 text-yellow-400">--</div>
                </div>
                <div class="bg-gray-800 p-3 rounded-xl border border-gray-700">
                    <div class="text-xs text-gray-400">市盈率(TTM)</div>
                    <div id="detail-pe" class="text-lg font-bold mt-1 text-purple-400">--</div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="bg-gray-800 p-3 rounded-xl border border-red-900/40">
                    <div class="text-xs text-gray-400">区间最高</div>
                    <div class="flex justify-between items-end mt-1">
                        <span id="period-high" class="text-2xl font-bold text-red-500">--</span>
                        <span id="period-high-date" class="text-xs text-gray-500">--</span>
                    </div>
                </div>
                <div class="bg-gray-800 p-3 rounded-xl border border-green-900/40">
                    <div class="text-xs text-gray-400">区间最低</div>
                    <div class="flex justify-between items-end mt-1">
                        <span id="period-low" class="text-2xl font-bold text-green-500">--</span>
                        <span id="period-low-date" class="text-xs text-gray-500">--</span>
                    </div>
                </div>
            </div>

            <div class="bg-gray-800 rounded-xl p-3 border border-gray-700">
                <div class="flex gap-2 mb-3 overflow-x-auto pb-1">
                    <button onclick="renderChart(1)" class="k-btn px-4 py-1.5 text-sm bg-gray-700 rounded-full hover:bg-blue-600 transition-colors">1分K</button>
                    <button onclick="renderChart(101)" class="k-btn px-4 py-1.5 text-sm bg-blue-600 rounded-full hover:bg-blue-600 transition-colors">日K</button>
                    <button onclick="renderChart(103)" class="k-btn px-4 py-1.5 text-sm bg-gray-700 rounded-full hover:bg-blue-600 transition-colors">月K</button>
                    <button onclick="renderChart(104)" class="k-btn px-4 py-1.5 text-sm bg-gray-700 rounded-full hover:bg-blue-600 transition-colors">季K</button>
                    <button onclick="renderChart(105)" class="k-btn px-4 py-1.5 text-sm bg-gray-700 rounded-full hover:bg-blue-600 transition-colors">年K</button>
                </div>
                <div id="kline-chart" class="w-full h-[400px] bg-gray-900 rounded-lg border border-gray-700"></div>
            </div>
            
        </div>
    </div>


    <script>
        let myChart = null;
        let currentSecId = '';
        let currentTencentCode = '';
        let detailPolling = null;

        // 本地自选股数据
        let myStocks = JSON.parse(localStorage.getItem('myWatchlist')) || ['sh000001', 'sh600519', 'sz002594'];

        /* =========================================
           步骤一：执行搜索，仅展示结果卡片
           ========================================= */
        function executeSearch() {
            const inputVal = document.getElementById('search-input').value.trim().toLowerCase();
            if (!inputVal) return alert("请输入股票代码！");

            const codeNum = inputVal.replace(/[^0-9]/g, ''); 
            if (codeNum.length !== 6) return alert("请输入6位有效的股票代码！");
            
            const prefix = (inputVal.startsWith('sh') || codeNum.startsWith('6')) ? 'sh' : 'sz';
            const tCode = prefix + codeNum;

            // 获取一次腾讯接口生成搜索结果卡片
            const script = document.createElement('script');
            script.src = `https://qt.gtimg.cn/q=${tCode}`;
            script.onload = () => {
                const dataStr = window[`v_${tCode}`];
                if (dataStr && dataStr.split('~').length > 30) {
                    const details = dataStr.split('~');
                    const name = details[1];
                    const price = parseFloat(details[3]).toFixed(2);
                    const changePercent = parseFloat(details[32]);
                    const colorClass = changePercent > 0 ? 'text-red-500' : (changePercent < 0 ? 'text-green-500' : 'text-white');
                    const sign = changePercent > 0 ? '+' : '';

                    document.getElementById('search-result-area').classList.remove('hidden');
                    document.getElementById('search-result-card').innerHTML = `
                        <div onclick="openDetail('${tCode}')" class="bg-gray-900 rounded-xl p-4 shadow border border-blue-500/50 cursor-pointer hover:bg-gray-800 transition-colors flex justify-between items-center group">
                            <div>
                                <div class="text-lg font-bold group-hover:text-blue-400 transition-colors">${name}</div>
                                <div class="text-xs text-gray-400 mt-1 uppercase">${tCode}</div>
                            </div>
                            <div class="text-right ${colorClass}">
                                <div class="text-xl font-bold">${price}</div>
                                <div class="text-sm">${sign}${changePercent}%</div>
                            </div>
                            <div class="ml-4 text-gray-500 group-hover:text-blue-400">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            </div>
                        </div>
                    `;
                } else {
                    alert("未找到该股票代码，请核对后重试。");
                }
                document.head.removeChild(script);
            };
            document.head.appendChild(script);
        }

        /* =========================================
           步骤二：打开详情页 (从搜索或自选股点击进入)
           ========================================= */
        function openDetail(tCode) {
            currentTencentCode = tCode;
            const codeNum = tCode.replace(/[^0-9]/g, '');
            currentSecId = (tCode.startsWith('sh') ? '1.' : '0.') + codeNum;

            // 切换 UI 显示
            document.getElementById('main-screen').classList.add('hidden');
            const detailScreen = document.getElementById('detail-screen');
            detailScreen.classList.remove('hidden');
            
            // 重置滚动条到顶部
            detailScreen.scrollTo(0, 0);

            // 更新自选按钮状态
            updateWatchlistButtonState();

            // 立即获取一次详情，并开始定时刷新详情价格
            fetchDetailData();
            renderChart(101); // 默认画日K
            if (detailPolling) clearInterval(detailPolling);
            detailPolling = setInterval(fetchDetailData, 3000);

            // 延迟重绘 ECharts 以修复 display:none 导致宽度读取错误的问题
            setTimeout(() => { if (myChart) myChart.resize(); }, 100);
        }

        function closeDetail() {
            document.getElementById('detail-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            if (detailPolling) clearInterval(detailPolling); // 关闭详情页更新
            fetchWatchlist(); // 返回主页时立刻刷新一次自选股列表
        }

        /* =========================================
           详情页内部逻辑 (拉取数据、K线、自选股控制)
           ========================================= */
        function fetchDetailData() {
            if (!currentTencentCode) return;
            const script = document.createElement('script');
            script.src = `https://qt.gtimg.cn/q=${currentTencentCode}`;
            script.onload = () => {
                const dataStr = window[`v_${currentTencentCode}`];
                if (dataStr) {
                    const details = dataStr.split('~');
                    if (details.length > 49) {
                        // 导航栏
                        document.getElementById('nav-name').innerText = details[1];
                        document.getElementById('nav-code').innerText = currentTencentCode;

                        // 核心价格
                        const price = parseFloat(details[3]);
                        const changeAmount = parseFloat(details[31]);
                        const changePercent = parseFloat(details[32]);
                        const sign = changeAmount > 0 ? '+' : '';
                        const colorClass = changeAmount > 0 ? 'text-red-500' : (changeAmount < 0 ? 'text-green-500' : 'text-white');

                        document.getElementById('detail-price').innerText = price.toFixed(2);
                        document.getElementById('detail-price').className = `text-2xl font-bold mt-1 ${colorClass}`;
                        
                        document.getElementById('detail-change').innerText = `${sign}${changeAmount} (${sign}${changePercent}%)`;
                        document.getElementById('detail-change').className = `text-xl font-bold mt-1 ${colorClass}`;

                        document.getElementById('detail-pe').innerText = details[39] || '--';
                        document.getElementById('detail-vol-ratio').innerText = details[49] || '--';
                    }
                }
                document.head.removeChild(script);
            };
            document.head.appendChild(script);
        }

        function renderChart(klt) {
            document.querySelectorAll('.k-btn').forEach(btn => btn.classList.replace('bg-blue-600', 'bg-gray-700'));
            event && event.target.classList.replace('bg-gray-700', 'bg-blue-600');

            const cbName = 'jsonp_kline_' + Date.now();
            const url = `https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=${currentSecId}&fields1=f1,f2,f3,f4,f5&fields2=f51,f52,f53,f54,f55&klt=${klt}&fqt=1&end=20500101&lmt=150&cb=${cbName}`;

            window[cbName] = function(data) {
                if (!data || !data.data || !data.data.klines) return;
                const klines = data.data.klines;
                
                let maxHigh = -1, maxHighDate = '';
                let minLow = 999999, minLowDate = '';

                klines.forEach(line => {
                    const parts = line.split(',');
                    const dateStr = parts[0].length > 10 ? parts[0].substring(5,16) : parts[0]; 
                    const high = parseFloat(parts[3]);
                    const low = parseFloat(parts[4]);
                    if (high > maxHigh) { maxHigh = high; maxHighDate = dateStr; }
                    if (low < minLow) { minLow = low; minLowDate = dateStr; }
                });

                document.getElementById('period-high').innerText = maxHigh.toFixed(2);
                document.getElementById('period-high-date').innerText = maxHighDate;
                document.getElementById('period-low').innerText = minLow.toFixed(2);
                document.getElementById('period-low-date').innerText = minLowDate;

                drawEChart(klines);
                delete window[cbName];
            };

            const script = document.createElement('script');
            script.src = url;
            script.onload = () => document.head.removeChild(script);
            document.head.appendChild(script);
        }

        function calculateMA(dayCount, data) {
            let result = [];
            for (let i = 0, len = data.length; i < len; i++) {
                if (i < dayCount) { result.push('-'); continue; }
                let sum = 0;
                for (let j = 0; j < dayCount; j++) sum += data[i - j][1];
                result.push(+(sum / dayCount).toFixed(2));
            }
            return result;
        }

        function drawEChart(klines) {
            if (!myChart) myChart = echarts.init(document.getElementById('kline-chart'));
            const categoryData = [];
            const values = []; 

            klines.forEach(line => {
                const parts = line.split(',');
                const timeStr = parts[0].length > 10 ? parts[0].substring(5,16) : parts[0]; 
                categoryData.push(timeStr);
                values.push([parseFloat(parts[1]), parseFloat(parts[2]), parseFloat(parts[4]), parseFloat(parts[3])]);
            });

            const option = {
                backgroundColor: 'transparent',
                tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
                legend: { data: ['K线', 'MA5', 'MA10', 'MA20'], textStyle: { color: '#9CA3AF' }, top: 0 },
                grid: { left: '12%', right: '5%', bottom: '10%', top: '15%' },
                xAxis: { type: 'category', data: categoryData, axisLine: { lineStyle: { color: '#4B5563' } } },
                yAxis: { scale: true, axisLine: { lineStyle: { color: '#4B5563' } }, splitLine: { lineStyle: { color: '#374151', type: 'dashed' } } },
                dataZoom: [{ type: 'inside', start: 60, end: 100 }],
                series: [
                    { name: 'K线', type: 'candlestick', data: values, itemStyle: { color: '#EF4444', color0: '#10B981', borderColor: '#EF4444', borderColor0: '#10B981' } },
                    { name: 'MA5', type: 'line', data: calculateMA(5, values), smooth: true, showSymbol: false, lineStyle: { width: 1.5, color: '#F59E0B' } },
                    { name: 'MA10', type: 'line', data: calculateMA(10, values), smooth: true, showSymbol: false, lineStyle: { width: 1.5, color: '#3B82F6' } },
                    { name: 'MA20', type: 'line', data: calculateMA(20, values), smooth: true, showSymbol: false, lineStyle: { width: 1.5, color: '#A855F7' } }
                ]
            };
            myChart.setOption(option);
        }
        window.addEventListener('resize', () => { if (myChart) myChart.resize(); });

        /* =========================================
           自选股逻辑 (主页列表渲染与状态切换)
           ========================================= */
        function updateWatchlistButtonState() {
            const btn = document.getElementById('btn-toggle-watchlist');
            if (myStocks.includes(currentTencentCode)) {
                btn.innerText = "- 取消自选";
                btn.className = "bg-gray-700 hover:bg-gray-600 text-sm px-3 py-1.5 rounded text-white transition-colors border border-gray-600";
            } else {
                btn.innerText = "+ 加自选";
                btn.className = "bg-green-600 hover:bg-green-700 text-sm px-3 py-1.5 rounded text-white transition-colors";
            }
        }

        function toggleWatchlist() {
            if (!currentTencentCode) return;
            if (myStocks.includes(currentTencentCode)) {
                myStocks = myStocks.filter(item => item !== currentTencentCode);
            } else {
                myStocks.push(currentTencentCode);
            }
            localStorage.setItem('myWatchlist', JSON.stringify(myStocks));
            updateWatchlistButtonState();
        }

        function removeFromWatchlist(event, code) {
            event.stopPropagation(); // 阻止点击删除按钮时触发整个卡片的跳转
            if(confirm('确定要移出自选吗？')) {
                myStocks = myStocks.filter(item => item !== code);
                localStorage.setItem('myWatchlist', JSON.stringify(myStocks));
                fetchWatchlist();
            }
        }

        function fetchWatchlist() {
            const container = document.getElementById('stock-container');
            if (document.getElementById('main-screen').classList.contains('hidden')) return; // 如果在详情页，不刷新主页列表
            if (myStocks.length === 0) {
                container.innerHTML = '<div class="text-gray-500 col-span-3 text-center py-10 bg-gray-800 rounded-xl border border-gray-700 border-dashed">自选股为空，请在上方搜索添加。</div>';
                return;
            }

            const script = document.createElement('script');
            script.src = `https://qt.gtimg.cn/q=${myStocks.join(',')}`;
            script.onload = () => {
                let htmlContent = '';
                myStocks.forEach(code => {
                    const dataStr = window[`v_${code}`];
                    if (dataStr) {
                        const details = dataStr.split('~');
                        if (details.length > 30) {
                            const name = details[1];
                            const price = parseFloat(details[3]).toFixed(2);
                            const changeAmount = parseFloat(details[31]);
                            const changePercent = parseFloat(details[32]);
                            
                            const colorClass = changeAmount > 0 ? 'text-red-500' : (changeAmount < 0 ? 'text-green-500' : 'text-white');
                            const sign = changeAmount > 0 ? '+' : '';

                            htmlContent += `
                                <div onclick="openDetail('${code}')" class="bg-gray-800 rounded-xl p-4 shadow-lg flex justify-between items-center relative transition-transform hover:scale-[1.02] border border-gray-700 hover:border-blue-500/50 group cursor-pointer">
                                    <div>
                                        <div class="text-lg font-bold group-hover:text-blue-400 transition-colors">${name}</div>
                                        <div class="text-xs text-gray-400 mt-1 uppercase">${code}</div>
                                    </div>
                                    <div class="text-right ${colorClass} pr-4">
                                        <div class="text-2xl font-bold">${price}</div>
                                        <div class="text-sm mt-1">${sign}${changeAmount} (${sign}${changePercent}%)</div>
                                    </div>
                                    <button onclick="removeFromWatchlist(event, '${code}')" class="absolute top-1/2 right-2 -translate-y-1/2 text-gray-600 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity p-2 bg-gray-900 rounded-full">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                    </button>
                                </div>
                            `;
                        }
                    }
                });
                container.innerHTML = htmlContent;
                document.head.removeChild(script); 
            };
            document.head.appendChild(script);
        }

        // 启动主页定时器
        fetchWatchlist();
        setInterval(fetchWatchlist, 3000);
    </script>
</body>
</html>
